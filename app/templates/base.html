<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Medidor de Excelência ELOS{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/elos.css">
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand-bar" href="{% if request.url.path.startswith('/admin') %}/admin{% else %}#{% endif %}">
          <img src="/static/img/signo-elos.png" alt="ELOS" class="brand-bar__sigil">
          <span class="brand">Medidor de <em>Excelência</em></span>
        </a>
        <span class="brand-small">
          ELO Business — Pilar Pessoas
          {% if request.url.path.startswith('/admin') %}
            · <a class="brand-small__link" href="/logout">Sair</a>
          {% endif %}
        </span>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer class="app">
      <img src="/static/img/logo-elos.png" alt="ELOS">
      <span>ELO Business — Programa de Excelência Empresarial</span>
    </footer>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
